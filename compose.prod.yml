services:
  postgres:
    volumes:
      - ${DATA_ROOT}/postgres:/var/lib/postgresql/data

  redis:
    volumes:
      - ${DATA_ROOT}/redis:/data

  backend:
    image: ${BACKEND_IMAGE}
    env_file:
      - ${CONFIG_ROOT}/.env
    volumes:
      - ${CONFIG_ROOT}/config.json:/app/config.json:ro
      - ${CONFIG_ROOT}/.env:/app/.env:ro
      - ${DATA_ROOT}/raw:/data/raw
      - ${DATA_ROOT}/datasets:/data/datasets

  worker:
    image: ${BACKEND_IMAGE}
    env_file:
      - ${CONFIG_ROOT}/.env
    volumes:
      - ${CONFIG_ROOT}/config.json:/app/config.json:ro
      - ${CONFIG_ROOT}/.env:/app/.env:ro
      - ${DATA_ROOT}/raw:/data/raw
      - ${DATA_ROOT}/datasets:/data/datasets

  dashboard:
    image: ${DASHBOARD_IMAGE}

  proxy:
    ports:
      - "${PUBLIC_HTTP_PORT}:80"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro

  mediamtx:
    ports:
      - "${RTMP_PORT}:1935"
      - "${RTMPS_PORT}:1936"
      - "${HLS_PORT}:8888"
    volumes:
      - ./mediamtx.yml:/mediamtx.yml:ro
      - ./mediamtx-hooks:/mediamtx-hooks:ro
      - ${CONFIG_ROOT}/certs:/certs:ro
      - ${DATA_ROOT}/raw:/data/raw
