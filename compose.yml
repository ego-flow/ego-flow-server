services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
      PGDATA: /var/lib/postgresql/data/pgdata
    volumes:
      - "${TARGET_DIRECTORY}/postgres:/var/lib/postgresql/data"
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}",
        ]
      interval: 5s
      timeout: 5s
      retries: 20

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - "${TARGET_DIRECTORY}/redis:/data"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 20

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    env_file:
      - ./.env
    environment: &backend_environment
      NODE_ENV: production
      PORT: 3000
      HOST_HOME: ${HOST_HOME:-}
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}?schema=public
      REDIS_URL: ${REDIS_URL}
    volumes:
      - ./config.json:/app/config.json:ro
      - ./.env:/app/.env:ro
      - "${TARGET_DIRECTORY}/raw:/data/raw"
      - "${TARGET_DIRECTORY}/datasets:${TARGET_DIRECTORY}/datasets"
    command: >
      sh -c "npm run prisma:migrate:deploy &&
      npm run db:seed:prod &&
      npm run start"
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "require('http').get('http://127.0.0.1:3000/api/v1/health', (res) => process.exit(res.statusCode === 200 ? 0 : 1)).on('error', () => process.exit(1))",
        ]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 20s

  worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      backend:
        condition: service_healthy
    env_file:
      - ./.env
    environment: *backend_environment
    volumes:
      - ./config.json:/app/config.json:ro
      - ./.env:/app/.env:ro
      - "${TARGET_DIRECTORY}/raw:/data/raw"
      - "${TARGET_DIRECTORY}/datasets:${TARGET_DIRECTORY}/datasets"
    command: ["npm", "run", "worker:start"]

  dashboard:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_healthy
    environment:
      NODE_ENV: production
      HOST: 0.0.0.0
      PORT: 8088
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "require('http').get('http://127.0.0.1:8088/login', (res) => process.exit(res.statusCode === 200 ? 0 : 1)).on('error', () => process.exit(1))",
        ]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 20s

  proxy:
    image: caddy:2-alpine
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_healthy
      dashboard:
        condition: service_healthy
    ports:
      - "${PUBLIC_HTTP_PORT:-80}:80"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "wget -q -O /dev/null http://127.0.0.1/api/v1/health || exit 1",
        ]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 10s

  mediamtx:
    image: bluenviron/mediamtx:latest-ffmpeg
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_healthy
    environment:
      MTX_RTMPENCRYPTION: ${RTMPS_ENCRYPTION_MODE:-no}
      MTX_RTMPSADDRESS: :${RTMPS_PORT:-1936}
      MTX_RTMPSERVERCERT: ${RTMPS_CERT_PATH:-/certs/server.crt}
      MTX_RTMPSERVERKEY: ${RTMPS_KEY_PATH:-/certs/server.key}
    ports:
      - "${RTMP_PORT:-1935}:1935"
      - "${RTMPS_PORT:-1936}:1936"
      - "${HLS_PORT:-8888}:8888"
    volumes:
      - ./mediamtx.yml:/mediamtx.yml:ro
      - ./mediamtx-hooks:/mediamtx-hooks:ro
      - ./certs:/certs:ro
      - "${TARGET_DIRECTORY}/raw:/data/raw"
