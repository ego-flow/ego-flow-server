services:
  postgres:
    environment:
      PGDATA: /var/lib/postgresql/data/pgdata
    volumes:
      - ./data/postgres:/var/lib/postgresql/data

  redis:
    volumes:
      - ./data/redis:/data

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    env_file:
      - ./.env
    volumes:
      - ./config.json:/app/config.json:ro
      - ./.env:/app/.env:ro
      - ./data/raw:/data/raw
      - ./data/datasets:/data/datasets

  worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    env_file:
      - ./.env
    volumes:
      - ./config.json:/app/config.json:ro
      - ./.env:/app/.env:ro
      - ./data/raw:/data/raw
      - ./data/datasets:/data/datasets

  dashboard:
    build:
      context: ./frontend
      dockerfile: Dockerfile

  proxy:
    ports:
      - "${PUBLIC_HTTP_PORT:-80}:80"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro

  mediamtx:
    ports:
      - "${RTMP_PORT:-1935}:1935"
      - "${RTMPS_PORT:-1936}:1936"
      - "${HLS_PORT:-8888}:8888"
    volumes:
      - ./mediamtx.yml:/mediamtx.yml:ro
      - ./mediamtx-hooks:/mediamtx-hooks:ro
      - ./certs:/certs:ro
      - ./data/raw:/data/raw
